services:
  edge:
    image: nginx:1.27-alpine
    container_name: incident-edge
    depends_on:
      - frontend
      - api
    ports:
      - "8081:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - incident-net
    restart: unless-stopped

  frontend:
    build:
      context: ./services/frontend
    container_name: incident-frontend
    expose:
      - "80"
    networks:
      - incident-net
    restart: unless-stopped

  api:
    build:
      context: ./services/api
    container_name: incident-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://incident_app:incident_password@postgres:5432/incident_response
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - incident-net
    restart: unless-stopped

  worker:
    build:
      context: ./services/api
    container_name: incident-worker
    command: ["python", "worker.py"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://incident_app:incident_password@postgres:5432/incident_response
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - incident-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: incident-postgres
    environment:
      POSTGRES_DB: incident_response
      POSTGRES_USER: incident_app
      POSTGRES_PASSWORD: incident_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident_app -d incident_response"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - incident-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: incident-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - incident-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: incident-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - api
    networks:
      - incident-net
    restart: unless-stopped

networks:
  incident-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
